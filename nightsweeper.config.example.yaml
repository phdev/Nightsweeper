# Nightsweeper configuration (committed example).
# Copy to nightsweeper.config.yaml (gitignored) and edit for your machine,
# or just run `nightsweeper setup` to generate one interactively.

schedule:
  hour: 3        # 03:00 local; launchd StartCalendarInterval
  minute: 0

caps:
  nightly_task_cap: 20       # hard stop: max chores dispatched per night
  nightly_dollar_cap: 5.00   # hard stop: max $ spent across paid agents per night
  per_task_cap: 1.00         # enforced only when preflight.mode == 'gate' (V2)

# Where your authored chore list lives (YAML or JSON). Each entry may carry a
# per-task `validator_cmd` (a shell command that exits 0 iff the chore is done),
# which makes it a custom-cmd chore — the "did it work?" forcing function.
tasks_file: nightsweeper.tasks.yaml

# Preflight cost prediction (V2). 'advisory' records predicted_lo/hi + a report
# accuracy line; 'gate' additionally parks chores whose estimate exceeds per_task_cap.
# Ships 'advisory' until your own replay clears the report's >=70% bracket bar.
preflight:
  mode: advisory

# Extra backlog sources beyond tasks_file. Sources only ever surface REAL chores —
# Nightsweeper never invents work.
sources:
  - name: github_issues
    repos: ["phdev/Nightsweeper"]
    value_label_map:
      "priority:high": high
      "priority:med": med
      "priority:low": low
    default_value: med
    validator_label_prefix: "validator:"   # e.g. a label "validator:test"
    default_validator: test

  - name: todo_scan
    root: "."
    # Only ENROLLED markers dispatch — bare TODO/FIXME are left alone:
    #   TODO(nightsweeper: validator=test value=med) make the retry path idempotent
    default_value: low
    default_validator: test

  # Apple Notes (macOS; needs Automation/TCC permission for headless runs).
  # One line = one chore; done items (strikethrough / [x]) are skipped; an inline
  # tag overrides defaults, e.g. "Fix retry [validator=test value=high]":
  # - name: apple_notes
  #   note: "AI learning path"
  #   heading: Depthfinder    # optional: only items under this heading become chores
  #   default_validator: test

  # Linear (needs $LINEAR_API_KEY):
  # - name: linear
  #   team: ENG
  #   default_value: med
  #   default_validator: test

# Your agents — the overnight crew. cost_rank orders them: the cheapest eligible
# agent that's free right now does each chore; it escalates ONCE on failure, then parks.
agents:
  # Free local agent. kind 'aider' drives an Ollama model headlessly (proven here).
  - name: qwen
    kind: aider                # or 'ollama'
    cost_rank: 0               # lower = cheaper = tried first when eligible
    model: "qwen2.5-coder:7b"
    ollama_host: "http://localhost:11434"   # or http://<lan-ip>:11434 for a remote model
    edit_format: whole         # robust for small models
    timeout_sec: 1800
    capability:
      validators: [test, typecheck, build, custom-cmd]
      max_complexity: medium

  - name: codex                # ChatGPT-plan quota, $0 marginal, quota-gated
    kind: codex
    cost_rank: 1               # cheaper than claude ($0 vs metered) → preferred cloud agent
    max_used_percent: 95       # unavailable once either rate-limit window hits this
    sessions_dir: "~/.codex/sessions"
    timeout_sec: 1800
    capability:
      validators: [test, typecheck, build, custom-cmd]
      max_complexity: high

  - name: claude               # metered cloud agent; budget-gated, fail-closed
    kind: claude
    cost_rank: 2
    model: "claude-sonnet-4-6"
    nightly_budget: 3.00       # per-night $ budget for this agent; also the downgrade denominator
    per_task_floor: 0.50       # min remaining budget to attempt (no estimate in V1)
    timeout_sec: 1800
    cost_model:                # V2 preflight estimate (Sonnet list rates, $/Mtok)
      input_per_mtok: 3.0
      output_per_mtok: 15.0
      expected_output_tokens: 1500
    capability:
      validators: [test, typecheck, build, custom-cmd, none]
      max_complexity: high

validators:
  test: "npm test"
  typecheck: "tsc --noEmit"
  build: "npm run build"

# Adjudication gates (multi-validator): run AFTER a chore's functional validator
# passes; ALL must hold, and each is reported separately. A change that passes its
# tests but fails a gate is kept OUT of a passing branch — so an agent can't "pass"
# by degrading the codebase.
# gates:
#   - name: depthfinder
#     cmd: "npx depthfinder scan . --warn-below 0.85 --strict"
#     required: true       # set false to skip silently when the command isn't installed

isolation:
  worktree_dir: ".nightsweeper/worktrees"
  pr_opt_in: false             # default: labeled branch only, no PR
  branch_prefix: "nightsweeper/"
  base_ref: "origin/HEAD"

report:
  path: "nightsweeper-report.md"
  downgrade:
    window_nights: 7
    spend_pct_threshold: 0.25  # recommend downgrade if spend < 25% of the window budget ...
    min_passes: 3              # ... AND agent-attributable passes < this
