# Nightsweeper configuration (committed example).
# Copy to nightsweeper.config.yaml (gitignored) and edit for your machine.

schedule:
  hour: 3        # 03:00 local; launchd StartCalendarInterval
  minute: 0

caps:
  nightly_task_cap: 20       # hard stop: max tasks dispatched per night
  nightly_dollar_cap: 5.00   # hard stop: max $ spent across cloud lanes per night
  per_task_cap: 1.00         # enforced only when preflight.mode == 'gate' (V2)

# Read-only context enrichers (V2): never produce tasks, only add context passed
# to a lane via dispatch(context=). Gbrain is an enricher (no confirmed backlog MCP).
enrichers: []                # e.g. ["gbrain"] once a Gbrain MCP is wired

# Preflight cost prediction (V2). 'advisory' records predicted_lo/hi + a report
# accuracy line; 'gate' additionally skips tasks whose estimate exceeds per_task_cap.
# Ships 'advisory' until your own 20-task replay clears the >=70% bracket bar (S6).
preflight:
  mode: advisory

sources:
  - name: github_issues
    repos: ["phdev/Nightsweeper"]
    labels: []               # optional label filter
    value_label_map:
      "priority:high": high
      "priority:med": med
      "priority:low": low
    default_value: med
    validator_label_prefix: "validator:"   # e.g. a label "validator:test"
    default_validator: test

  - name: todo_scan
    paths: ["."]
    # Only ENROLLED markers dispatch — bare TODO/FIXME are report-only inventory:
    #   TODO(nightsweeper: validator=test value=med)
    default_value: low

  # V2 source (needs $LINEAR_API_KEY):
  # - name: linear
  #   team: ENG
  #   default_value: med
  #   default_validator: test

backends:
  - name: local                # the only truly-free lane ($0, unlimited)
    cost_rank: 0               # lower = cheaper = tried first when eligible
    model: "qwen2.5-coder:7b"  # S3-validated; Qwen3-Coder-30B is the agentic upgrade
    ollama_host: "http://localhost:11434"
    timeout_sec: 1800
    capability:
      validators: [test, typecheck, build, custom-cmd]
      max_complexity: medium   # set from S3's measured pass-rate-by-complexity

  - name: codex                # V2: ChatGPT-plan quota, $0 marginal, quota-gated
    cost_rank: 1               # cheaper than claude ($0 vs metered) → preferred cloud lane
    max_used_percent: 95       # unavailable once either rate-limit window hits this
    sessions_dir: "~/.codex/sessions"
    timeout_sec: 1800
    capability:
      validators: [test, typecheck, build, custom-cmd]
      max_complexity: high

  - name: claude               # metered cloud lane; budget-gated, fail-closed
    cost_rank: 2
    model: "claude-sonnet-4-6" # S1: ~$0.05/small task
    nightly_budget: 3.00       # per-night $ budget for this lane (budget-fallback)
    per_task_floor: 0.50       # min remaining budget to attempt (no estimate in V1)
    timeout_sec: 1800
    cost_model:                # V2 preflight estimate (Sonnet list rates, $/Mtok)
      input_per_mtok: 3.0
      output_per_mtok: 15.0
      expected_output_tokens: 1500
    capability:
      validators: [test, typecheck, build, custom-cmd, none]
      max_complexity: high

validators:
  test: "pytest -q"
  typecheck: "mypy ."
  build: "make build"

isolation:
  worktree_dir: ".nightsweeper/worktrees"
  pr_opt_in: false             # default: labeled branch only, no PR
  branch_prefix: "nightsweeper/"
  label_prefix: "nightsweeper:"

report:
  path: "nightsweeper-report.md"
  downgrade:
    window_nights: 7
    spend_pct_threshold: 0.10  # recommend downgrade if spend < 10% of cap ...
    min_passes: 1              # ... AND lane-attributable passes < this
